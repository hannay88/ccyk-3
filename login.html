<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CCYK Login</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>❤️ CCYK</h1>
  <p>အကောင့်ဝင်ရန်</p>
</header>

<main>

  <div class="card">

    <h2>Login</h2>

    <form id="loginForm">

      <label for="phone">ဖုန်းနံပါတ်</label>

      <input
        type="tel"
        id="phone"
        placeholder="09xxxxxxxxx"
        required
      >

      <label for="password">စကားဝှက်</label>

      <input
        type="password"
        id="password"
        placeholder="စကားဝှက်ထည့်ပါ"
        required
      >

      <button type="submit">
        Login
      </button>

    </form>

    <p>
      အကောင့်မရှိသေးပါက
      <a href="register.html">Register</a>
    </p>

    <a href="index.html">← Home သို့ပြန်သွားရန်</a>

  </div>

</main>

<script src="script.js"></script>

</body>
</html>
