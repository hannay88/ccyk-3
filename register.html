<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCYK Register</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>❤️ Create Account</h1>
<p>CCYK အကောင့်ဖွင့်ပါ</p>
</header>

<main>

<div class="card">

<h2>Register</h2>

<form id="registerForm">
<label>အမည်</label>
<input
type="text"
id="registerName"
placeholder="အမည်"
required>

<label>အသက်</label>
<input
type="number"
id="registerAge"
placeholder="အသက်"
required>

<label>မြို့</label>
<input
type="text"
id="registerCity"
placeholder="Yangon"
required>

<label>ဝါသနာ</label>
<input
type="text"
id="registerHobby"
placeholder="Music, Travel"
required>

<label>ဓာတ်ပုံ URL</label>
<input
type="text"
id="registerPhoto"
placeholder="https://example.com/photo.jpg">

<label>ဖုန်းနံပါတ်</label>
<input
type="tel"
id="registerPhone"
placeholder="09xxxxxxxxx"
required>

<label>စကားဝှက်</label>
<input
type="password"
id="registerPassword"
placeholder="စကားဝှက်"
required>
<button type="submit">Create Account</button>

</form>

<p id="registerMessage"></p>

<p>
အကောင့်ရှိပြီးသားလား?
<a href="login.html">Login</a>
</p>

<p>
<a href="index.html">← Home</a>
</p>

</div>
</main>

<script src="script.js"></script>

</body>
</html>
