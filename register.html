
<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CCYK Register</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>❤️ CCYK</h1>
  <p>အကောင့်အသစ်ဖွင့်ရန်</p>
</header>

<main>

  <div class="card">

    <h2>Create Account</h2>

    <form id="registerForm">

      <label for="registerName">အမည်</label>
      <input
        type="text"
        id="registerName"
        placeholder="အမည်ထည့်ပါ"
        required
      >

      <label for="registerAge">အသက်</label>
      <input
        type="number"
        id="registerAge"
        min="18"
        max="100"
        placeholder="အသက်ထည့်ပါ"
        required
      >

      <label for="registerPhone">ဖုန်းနံပါတ်</label>
      <input
        type="tel"
        id="registerPhone"
        placeholder="09xxxxxxxxx"
        required
      >

      <label for="registerPassword">စကားဝှက်</label>
      <input
        type="password"
        id="registerPassword"
        minlength="4"
        placeholder="စကားဝှက်ထည့်ပါ"
        required
      >

      <button type="submit">
        Create Account
      </button>

    </form>

    <p id="registerMessage"></p>

    <p>
      အကောင့်ရှိပြီးသားလား။
      <a href="login.html">Login</a>
    </p>

    <a href="index.html">← Home</a>

  </div>

</main>

<script src="script.js"></script>

</body>
</html>
